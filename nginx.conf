# Nginx reverse-proxy config for VPS — place in /etc/nginx/sites-available/futurehive-portal
# Then: ln -s /etc/nginx/sites-available/futurehive-portal /etc/nginx/sites-enabled/
# Replace YOUR_DOMAIN with your actual domain (e.g. portal.futurehive.ai)

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Redirect HTTP → HTTPS (uncomment after SSL is set up)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

